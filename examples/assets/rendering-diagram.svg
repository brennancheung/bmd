<svg xmlns="http://www.w3.org/2000/svg" width="720" height="220" viewBox="0 0 720 220" role="img" aria-labelledby="title desc">
  <title id="title">bmd local SVG fixture</title>
  <desc id="desc">Three connected cards labeled Markdown, bmd, and readable output.</desc>
  <defs>
    <linearGradient id="background" x1="0" x2="1">
      <stop offset="0" stop-color="#7c3aed" />
      <stop offset="1" stop-color="#2563eb" />
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b" />
    </marker>
  </defs>
  <rect width="720" height="220" rx="24" fill="#f8fafc" />
  <g font-family="-apple-system, BlinkMacSystemFont, sans-serif" text-anchor="middle">
    <rect x="35" y="58" width="175" height="104" rx="16" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" />
    <text x="122.5" y="118" font-size="22" fill="#0f172a">Markdown</text>
    <line x1="220" y1="110" x2="273" y2="110" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)" />
    <rect x="285" y="45" width="150" height="130" rx="22" fill="url(#background)" />
    <text x="360" y="120" font-size="34" font-weight="700" fill="#ffffff">bmd</text>
    <line x1="447" y1="110" x2="500" y2="110" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)" />
    <rect x="510" y="58" width="175" height="104" rx="16" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" />
    <text x="597.5" y="103" font-size="20" fill="#0f172a">Readable</text>
    <text x="597.5" y="132" font-size="20" fill="#0f172a">output</text>
  </g>
